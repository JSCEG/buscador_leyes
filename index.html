<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>Buscador de Leyes · SENER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Noto+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Vis.js Timeline -->
    <script type="text/javascript"
        src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet"
        type="text/css" />
  <script type="module" crossorigin src="/assets/index-CieH34QR.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BB42D7Oi.css">
</head>

<body class="bg-white text-gray-900 font-body min-h-screen flex flex-col antialiased">

    <!-- Minimal Header -->
    <header class="w-full max-w-5xl mx-auto px-6 py-8 flex items-center justify-between">
        <div class="flex items-center gap-3 opacity-90 hover:opacity-100 transition-opacity">
            <img src="/img/logo_sener.png" alt="SENER"
                class="h-8 w-auto grayscale hover:grayscale-0 transition-all duration-500">
            <div class="h-8 w-px bg-gray-200 mx-1"></div>
            <span class="text-xs font-semibold tracking-widest text-gray-500 uppercase">Buscador Jurídico</span>
        </div>
        <nav class="hidden sm:flex gap-6 text-sm text-gray-500 font-medium">
            <a href="#" id="nav-inicio" class="hover:text-guinda transition-colors">Inicio</a>
            <a href="#" id="nav-leyes" class="hover:text-guinda transition-colors">Leyes</a>
            <a href="#" id="nav-ayuda" class="hover:text-guinda transition-colors">Ayuda</a>
        </nav>
    </header>

    <!-- Main Search Area -->
    <main
        class="flex-1 w-full max-w-3xl mx-auto px-6 flex flex-col items-center justify-start pt-12 sm:pt-24 pb-12 transition-all duration-500"
        id="main-container">

        <!-- Hero Section (Collapses on search) -->
        <div id="hero-section" class="text-center mb-10 transition-all duration-500 ease-in-out">
            <h1 class="font-head text-3xl sm:text-5xl font-light text-gray-800 mb-4 tracking-tight">
                Marco Legal <span class="text-guinda font-normal">Energético</span>
            </h1>
            <p class="text-gray-400 text-sm sm:text-base font-light max-w-md mx-auto">
                Explora leyes, reglamentos y artículos con búsqueda inteligente y resúmenes automáticos.
            </p>
        </div>

        <!-- Search Bar -->
        <div class="w-full relative group z-20">
            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-gray-400 group-focus-within:text-guinda transition-colors" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <input type="text" id="search-input"
                class="block w-full pl-14 pr-6 py-5 bg-white border border-gray-200 rounded-full text-lg shadow-sm placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-guinda/10 focus:border-guinda focus:shadow-lg transition-all duration-300"
                placeholder="¿Qué estás buscando hoy?">
            <div class="absolute inset-y-0 right-4 flex items-center">
                <div id="loading-indicator" class="hidden animate-spin rounded-full h-5 w-5 border-b-2 border-guinda">
                </div>
            </div>
        </div>

        <!-- Quick Filters / Suggestions -->
        <div id="quick-filters" class="mt-6 flex flex-wrap justify-center gap-3 opacity-0 animate-fade-in-up"
            style="animation-delay: 0.2s; animation-fill-mode: forwards;">
            <button
                class="px-4 py-1.5 bg-gray-50 border border-gray-100 rounded-full text-xs text-gray-500 hover:bg-white hover:border-guinda/30 hover:text-guinda hover:shadow-sm transition-all duration-300">Transmisión</button>
            <button
                class="px-4 py-1.5 bg-gray-50 border border-gray-100 rounded-full text-xs text-gray-500 hover:bg-white hover:border-guinda/30 hover:text-guinda hover:shadow-sm transition-all duration-300">CENACE</button>
            <button
                class="px-4 py-1.5 bg-gray-50 border border-gray-100 rounded-full text-xs text-gray-500 hover:bg-white hover:border-guinda/30 hover:text-guinda hover:shadow-sm transition-all duration-300">Distribución</button>
            <button
                class="px-4 py-1.5 bg-gray-50 border border-gray-100 rounded-full text-xs text-gray-500 hover:bg-white hover:border-guinda/30 hover:text-guinda hover:shadow-sm transition-all duration-300">Energías
                Limpias</button>
        </div>

        <!-- Stats (Minimal) -->
        <div id="stats-minimal" class="mt-12 text-center opacity-0 animate-fade-in-up text-xs text-gray-300 font-light"
            style="animation-delay: 0.4s; animation-fill-mode: forwards;">
            Cargando índice...
        </div>

        <!-- Results Area -->
        <div id="results-container" class="w-full mt-8 space-y-6 hidden opacity-0 transition-opacity duration-500">
            <!-- Results injected here -->
        </div>

        <!-- Law Detail View (Hidden by default) -->
        <div id="law-detail-container" class="w-full mt-8 hidden opacity-0 transition-opacity duration-500">
            <!-- Injected by JS -->
        </div>

    </main>

    <!-- Minimal Footer -->
    <footer class="py-8 text-center text-[10px] text-gray-300 border-t border-gray-50 mt-auto">
        <p>© 2026 Secretaría de Energía · Gobierno de México</p>
    </footer>

    <!-- Detail Modal (Clean & Centered) -->
    <div id="detail-modal"
        class="fixed inset-0 z-50 bg-white/80 backdrop-blur-md hidden items-center justify-center p-4 sm:p-8 transition-opacity duration-300">
        <div class="bg-white w-full max-w-2xl max-h-full rounded-2xl shadow-2xl border border-gray-100 flex flex-col transform scale-95 opacity-0 transition-all duration-300"
            id="modal-panel">
            <div class="flex items-center justify-between p-6 border-b border-gray-50">
                <div class="flex flex-col">
                    <span id="modal-ley" class="text-[10px] font-bold tracking-widest text-guinda uppercase mb-1">Ley de
                        Origen</span>
                    <h3 id="modal-title" class="font-head text-xl font-bold text-gray-900">Artículo 00</h3>
                </div>
                <button id="close-modal"
                    class="p-2 text-gray-400 hover:text-guinda hover:bg-guinda/5 rounded-full transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="modal-content"
                class="p-8 overflow-y-auto prose prose-sm max-w-none prose-headings:font-head prose-a:text-guinda">
                <!-- Content -->
            </div>
            <div class="p-4 border-t border-gray-50 bg-gray-50/50 rounded-b-2xl flex justify-end">
                <button
                    class="text-xs font-semibold text-gray-500 hover:text-guinda transition-colors flex items-center gap-1"
                    id="copy-btn">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3">
                        </path>
                    </svg>
                    Copiar Texto
                </button>
            </div>
        </div>
    </div>

    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
    </style>
</body>

</html>
